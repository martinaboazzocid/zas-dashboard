name: Dashboard ZAS — Actualización diaria

on:
  schedule:
    - cron: '30 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Dependencias
        run: pip install requests

      - name: Generar dashboard
        env:
          ODOO_PASS: ${{ secrets.ODOO_PASS }}
        run: python generar_dashboard.py

      - name: Publicar
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          commit_message: "update"
