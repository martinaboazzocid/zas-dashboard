name: Dashboard ZAS

on:
  schedule:
    - cron: '30 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Generar dashboard
        env:
          ODOO_PASS: ${{ secrets.ODOO_PASS }}
        run: python generar_dashboard.py

      - name: Deploy a gh-pages
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          cp dashboard_talentos.html /tmp/dashboard_talentos.html
          git checkout --orphan gh-pages-new
          git rm -rf . --quiet
          cp /tmp/dashboard_talentos.html ./dashboard_talentos.html
          git add dashboard_talentos.html
          git commit -m "Dashboard actualizado"
          git push origin gh-pages-new:gh-pages --force
